<div class="dashboard">
  <aside class="aside">
    <h3>Sections</h3>
    <div class="menu">
      @for (page of pages; track page.id) {
        <button
          type="button"
          class="menu-item"
          [class.active]="page.id === selectedPageId"
          (click)="selectPage(page.id)">
          {{ page.id }}. {{ page.title }}
        </button>
      }
    </div>
  </aside>

  <section class="content">
    <div class="content-head">
      <p class="eyebrow">Page {{ selectedPage.id }}</p>
      <h1>{{ selectedPage.title }}</h1>
      <p>{{ selectedPage.subtitle }}</p>
    </div>

    <div class="content-lines">
      @for (line of selectedPage.lines; track line) {
        <article class="line-card">
          {{ line }}
        </article>
      }
    </div>

    <button class="api-btn" type="button" (click)="getAll()">Load API sample</button>
  </section>
</div>
